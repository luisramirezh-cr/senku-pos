services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: senku
      POSTGRES_PASSWORD: senku_local
      POSTGRES_DB: senku_pos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senku -d senku_pos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
