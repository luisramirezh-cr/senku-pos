name: Deploy to Production

on:
  push:
    branches: [production]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 882788449114.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: senku-pos
  SERVICE_NAME: senku-pos-prod
  CLUSTER: default
  EXECUTION_ROLE: arn:aws:iam::882788449114:role/ecsTaskExecutionRole
  INFRA_ROLE: arn:aws:iam::882788449114:role/ecsInfrastructureRoleForExpressServices

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          docker build -f apps/pos/Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL=https://pos.gosenku.com \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=https://gosenku.com/sign-in \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL=https://gosenku.com/sign-up \
            --build-arg NEXT_PUBLIC_ROOT_URL=https://gosenku.com \
            -t "$IMAGE" \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            .
          docker push "$IMAGE"
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to ECS Express
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          SERVICE_NAME="${{ env.SERVICE_NAME }}"
          CLUSTER="${{ env.CLUSTER }}"

          PRIMARY_CONTAINER=$(cat <<JSON
          {
            "image": "$IMAGE",
            "containerPort": 8080,
            "environment": [
              {"name": "NODE_ENV", "value": "production"},
              {"name": "ROOT_API_URL", "value": "https://gosenku.com/api/internal"}
            ],
            "secrets": [
              {"name": "DATABASE_URL",               "valueFrom": "arn:aws:secretsmanager:us-east-1:882788449114:secret:senku/prod/POS_DATABASE_URL-ITZPm9"},
              {"name": "CLERK_SECRET_KEY",            "valueFrom": "arn:aws:secretsmanager:us-east-1:882788449114:secret:senku/prod/CLERK_SECRET_KEY-o8LVq8"},
              {"name": "INTERNAL_API_SECRET",         "valueFrom": "arn:aws:secretsmanager:us-east-1:882788449114:secret:senku/prod/POS_INTERNAL_API_SECRET-bMspSW"},
              {"name": "UBER_EATS_WEBHOOK_SECRET",    "valueFrom": "arn:aws:secretsmanager:us-east-1:882788449114:secret:senku/prod/POS_UBER_EATS_WEBHOOK_SECRET-tEe3SN"},
              {"name": "PEDIDOS_YA_WEBHOOK_SECRET",   "valueFrom": "arn:aws:secretsmanager:us-east-1:882788449114:secret:senku/prod/POS_PEDIDOS_YA_WEBHOOK_SECRET-eutYnm"}
            ]
          }
          JSON
          )

          NETWORK_CONFIG='{"subnets":["subnet-07b10b0efdf05464a","subnet-059ab685e838cca98","subnet-00625fd5bbdf5c199","subnet-0771c1a6db9b5ed88","subnet-0c038308f56524136","subnet-09941a6c76592dc4f"],"securityGroups":["sg-076112b2bf2027be3"]}'
          SCALING='{"minTaskCount":1,"maxTaskCount":10,"autoScalingMetric":"AVERAGE_CPU","autoScalingTargetValue":60}'

          # Check if service already exists
          SERVICE_ARN=$(aws ecs list-services \
            --cluster "$CLUSTER" \
            --query "serviceArns[?contains(@, '$SERVICE_NAME')]" \
            --output text 2>/dev/null || echo "")

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating ECS Express service $SERVICE_NAME..."
            aws ecs create-express-gateway-service \
              --service-name "$SERVICE_NAME" \
              --cluster "$CLUSTER" \
              --execution-role-arn "${{ env.EXECUTION_ROLE }}" \
              --infrastructure-role-arn "${{ env.INFRA_ROLE }}" \
              --health-check-path "/api/health" \
              --cpu 1024 \
              --memory 2048 \
              --primary-container "$PRIMARY_CONTAINER" \
              --network-configuration "$NETWORK_CONFIG" \
              --scaling-target "$SCALING"
          else
            echo "Updating ECS Express service $SERVICE_NAME..."
            aws ecs update-express-gateway-service \
              --service-arn "$SERVICE_ARN" \
              --primary-container "$PRIMARY_CONTAINER"
          fi
